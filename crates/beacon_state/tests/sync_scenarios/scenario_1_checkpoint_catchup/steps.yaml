# Scenario 1 (PR 1 subset): node boots from a checkpoint and observes
# that the tile is in Syncing mode at the checkpoint's slot.
#
# The "catch up via RPC blocks" half of the original scenario lives in a
# later PR that ships state_transition, sync_step, and block handling.
# Here we exercise only the bootstrap path through a real SilverSpine
# adapter with a real EF checkpoint SSZ.
#
# Source material borrowed from EF's sanity/blocks/attestation case:
# pre.ssz_snappy is the pre-state at slot 32.

startup_checkpoint: tests/mainnet/fulu/sanity/blocks/pyspec_tests/attestation/pre.ssz_snappy
# Checkpoint is at slot 32; the harness floors `slots_missing` to 3
# (must be > 2 for `Mode::Syncing` at bootstrap).
slots_missing: 3

steps:
  - kind: check
    mode: syncing
    head_slot: 32
